# Local topology: postgres + migrate + app + worker.
#
# `migrate` is a separate one-shot service, not an app entrypoint step. Two app
# replicas racing `alembic upgrade head` on boot is a real way to corrupt a
# schema; running it once, to completion, before anything else starts is not.

name: webhook-receiver

# The secrets come from your `.env` (Compose reads it for interpolation), and
# they have NO default here on purpose.
#
# An inline default would be worse than no default. Whatever signs a request from
# the host -- `make send`, a test, a provider simulator -- reads the secret from
# `.env`, while the container would be verifying against the default baked in
# here. The two would silently disagree, and every delivery would come back 401,
# with the correct-by-design indistinguishable error message telling you nothing
# about why. `:?` turns that into an immediate, explicit failure at `up` instead.
#
# DATABASE_URL is *not* taken from `.env`: inside the Compose network the host is
# `postgres`, whereas `.env` points at localhost for the local (non-Docker) flow.
# These are two different correct answers, so they stay separate.
x-app-env: &app-env
  DATABASE_URL: postgresql+asyncpg://webhook:webhook@postgres:5432/webhook_receiver
  ADMIN_API_KEY: ${ADMIN_API_KEY:?set it in .env -- run `make env` to create one}
  WEBHOOK_SECRETS: ${WEBHOOK_SECRETS:?set it in .env -- run `make env` to create one}
  ENVIRONMENT: ${ENVIRONMENT:-local}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: webhook
      POSTGRES_PASSWORD: webhook
      POSTGRES_DB: webhook_receiver
    ports:
      # The *host* side is overridable because 5432 is often already taken -- a
      # native Postgres from a package manager, WSL, or Homebrew. When it is, the
      # clash does not announce itself: Docker still reports the port as
      # published, connections still succeed, and they land on the *other*
      # server, which answers "password authentication failed for user webhook".
      # That reads like a credentials bug and is not one.
      #
      # The Makefile derives this from DATABASE_URL, so the port you connect to
      # and the port the container listens on cannot drift apart.
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      # `pg_isready` alone returns true while the server is still doing crash
      # recovery and refusing connections, so query the actual database.
      test: ["CMD-SHELL", "pg_isready -U webhook -d webhook_receiver -q"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s

  migrate:
    build:
      context: .
      target: runtime
    environment: *app-env
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      target: runtime
    environment: *app-env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    build:
      context: .
      target: runtime
    environment: *app-env
    command: ["python", "-m", "webhook_receiver.worker.main"]
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    # Scale freely: FOR UPDATE SKIP LOCKED means two workers never claim the
    # same row, and the advisory lock means they never race on one entity.
    #   docker compose up --scale worker=4

volumes:
  postgres-data:
