[alembic]
script_location = migrations
prepend_sys_path = src
path_separator = os

# Deliberately absent: sqlalchemy.url.
# The DSN carries a password. It comes from Settings (i.e. the environment) at
# runtime, never from a file in the repo (SPEC §NFR-6).

# Zero-padded, lexically sortable, so `ls versions/` reads in apply order.
file_template = %%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
